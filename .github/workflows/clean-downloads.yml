name: Clean Downloads Folder

on:
  workflow_dispatch:
    inputs:
      clean_all_files:
        description: 'تمام فایل‌های داخل پوشه downloads را پاک کن'
        required: false
        type: boolean
        default: false

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clean downloads folder
        env:
          CLEAN_ALL: ${{ github.event.inputs.clean_all_files }}
        run: |
          if [ "$CLEAN_ALL" != "true" ]; then
            echo "ℹ️ تیک پاک کردن فایل‌ها را نزدید، عملیات متوقف شد."
            exit 0
          fi

          DOWNLOADS_DIR="downloads"
          if [ -d "$DOWNLOADS_DIR" ]; then
            echo "🧹 در حال پاک کردن تمام فایل‌های داخل پوشه downloads..."
            # این دستور تمام فایل‌های داخل پوشه را پاک می‌کند اما خود پوشه را نگه می‌دارد
            find "$DOWNLOADS_DIR" -mindepth 1 -delete
            echo "✅ تمام فایل‌های داخل پوشه downloads با موفقیت پاک شدند."
          else
            echo "ℹ️ پوشه downloads وجود ندارد. عملیات متوقف شد."
            exit 0
          fi

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # فقط حذفیات پوشه downloads را stage کن
          git add -A downloads/

          if git diff --staged --quiet; then
            echo "📂 هیچ فایلی برای حذف وجود ندارد."
            exit 0
          fi

          git commit -m "🧹 پاکسازی خودکار پوشه downloads [skip ci]"
          git push origin "$BRANCH"